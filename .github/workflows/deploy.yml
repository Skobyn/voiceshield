name: Deploy VoiceShield

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build & Push
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/voiceshield:${{ github.sha }} .
          docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/voiceshield:latest .
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/voiceshield:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/voiceshield:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy voiceshield \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/voiceshield:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated
